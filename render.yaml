# Render Blueprint for the API half of this app (frontend deploys to Vercel
# separately — see README "Deployment"). Postgres itself is NOT defined
# here: it lives on an external free-tier provider (Neon or Supabase) so the
# database survives independently of Render's 90-day free Postgres expiry.
# Paste that provider's connection string into DATABASE_URL below when
# Render prompts for it (`sync: false` — set manually in the dashboard, not
# committed here).
#
# Just one service: challenge-rewards-api, a free Web Service. The
# Dockerfile CMD (`alembic upgrade head && uvicorn ...`) migrates on every
# boot, then serves `/api`.
#
# The evaluation worker deliberately is NOT a second Render service —
# Render has no free plan for either an always-on Background Worker
# (~$7/mo) or a Cron Job (paid instance type + Render wants a card on file
# even though the per-second billing would be pennies). Instead a GitHub
# Actions scheduled workflow (`.github/workflows/drain-worker.yml`) runs
# `python -m app.worker --once` every 5 minutes on GitHub's free runners —
# genuinely $0, no payment method anywhere. See that workflow file and the
# README's "Deployment" section for the latency tradeoff this implies.
#
# Review this against Render's current Blueprint docs before running "New
# Blueprint Instance" — field names occasionally change.

services:
  - type: web
    name: challenge-rewards-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false # paste your Neon/Supabase connection string here
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: FORUM_TIMEZONE
        value: UTC
      - key: ENVIRONMENT
        value: production
      # Comma-free JSON list, exact origins the frontend is served from.
      - key: CORS_ORIGINS
        value: '["https://your-app.vercel.app"]'
      # Additive to CORS_ORIGINS — matches Vercel's per-PR preview URLs
      # (https://<project>-<hash>-<team>.vercel.app). Update the project
      # name below to match your Vercel project.
      - key: CORS_ORIGIN_REGEX
        value: "https://your-app-.*\\.vercel\\.app"
      - key: EVENT_RATE_LIMIT_CAPACITY
        value: "20"
      - key: EVENT_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
