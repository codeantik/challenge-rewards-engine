services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: challenge_rewards
    ports:
      # Host port 5433 (not 5432) so this doesn't collide with a Postgres
      # you may already have running locally. Containers still talk to
      # each other over the default 5432 on the compose network.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/challenge_rewards
      FORUM_TIMEZONE: UTC
      JWT_SECRET: change-me-in-.env
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build: ./backend
    command: ["python", "-m", "app.worker"]
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/challenge_rewards
      FORUM_TIMEZONE: UTC
      JWT_SECRET: change-me-in-.env
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
